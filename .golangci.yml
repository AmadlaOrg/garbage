linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - unused
    - ineffassign
    - bodyclose
    - revive
    - gocritic
    - misspell
    - nilerr

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: true

run:

issues:
  exclude-files:
    - '^.*mock_.*\.go$'
